services:
  # ─────────────────────────────────────────
  # MySQL 8.4
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: dayflow_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: ${DB_DATABASE:-dayflow}
      MYSQL_USER: ${DB_USERNAME:-dayflow}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    ports:
      - "3306:3306"
    networks:
      - dayflow_network
    healthcheck:
      # Use container env (Compose: $$ → $) so ping password always matches MYSQL_ROOT_PASSWORD.
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  # ─────────────────────────────────────────
  # PHP 8.3-FPM (Laravel Backend)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: dayflow_backend
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      # Ensures GOOGLE_* and secrets match backend/.env (avoids empty host env blocking Laravel safeLoad)
      - ./backend/.env
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      APP_ENV: ${APP_ENV:-local}
      # Do not set APP_KEY here — an empty value overrides backend/.env and breaks encryption.
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-dayflow}
      DB_USERNAME: ${DB_USERNAME:-dayflow}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      ALLOWED_EMAIL_DOMAIN: ${ALLOWED_EMAIL_DOMAIN:-uello.com.br}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SLACK_CHANNEL: ${SLACK_CHANNEL:-#general}
      VACATION_CONFLICT_THRESHOLD_PERCENT: ${VACATION_CONFLICT_THRESHOLD_PERCENT:-30}
      DEV_PASSWORD_LOGIN: ${DEV_PASSWORD_LOGIN:-true}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost:5173}
      SESSION_DRIVER: cookie
      CACHE_DRIVER: file
      QUEUE_CONNECTION: sync
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - dayflow_network

  # ─────────────────────────────────────────
  # NGINX (reverse proxy for backend)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: dayflow_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - dayflow_network

  # ─────────────────────────────────────────
  # Node 22 + Vite (React Frontend)
  # ─────────────────────────────────────────
  frontend:
    image: node:22-alpine
    container_name: dayflow_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
      VITE_DEV_LOGIN: "true"
      # Windows: Vite vê mudanças em arquivos montados
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - nginx
    networks:
      - dayflow_network

  # ─────────────────────────────────────────
  # Redis Cache & Sessions
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dayflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dayflow_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Mailpit (Email testing)
  # ─────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: dayflow_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - dayflow_network

# ─────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  frontend_node_modules:
    driver: local

# ─────────────────────────────────────────
# Networks
# ─────────────────────────────────────────
networks:
  dayflow_network:
    driver: bridge
